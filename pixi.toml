# Auto-generated by scaffold_analysis.py — edit as needed for this analysis.
# This is the pixi environment for the analysis. All scripts run through:
#   pixi run py script.py
#
# To add a dependency: add it below, then `pixi install` from this directory.

[workspace]
name = "higgs_tautau"
version = "0.1.0"
channels = ["conda-forge"]
platforms = ["linux-64", "osx-arm64"]

[dependencies]
python = ">=3.11"
pandoc = ">=3.0"
pandoc-crossref = ">=0.3"
tectonic = ">=0.15"
uproot = ">=5.0"
awkward = ">=2.0"
hist = ">=2.7"
boost-histogram = ">=1.4"
numpy = ">=1.24"
scipy = ">=1.11"
matplotlib = ">=3.8"
mplhep = ">=1.1.0"
vector = ">=1.1"
particle = ">=0.23"
rich = ">=13.0"
# --- Uncomment groups below as needed (Phase 3/4 executors: uncomment what you need) ---
# Statistical models and fitting
pyhf = ">=0.7"
cabinetry = ">=0.6"
iminuit = ">=2.25"
# Unbinned likelihood fits
zfit = ">=0.20"
# MVA / classification
xgboost = ">=2.0"
scikit-learn = ">=1.3"
# Columnar event processing at scale
coffea = ">=2024.0"

# --- Core stack (always needed) ---
[pypi-dependencies]

[tasks]
py = "python"
# build-pdf is a convenience helper for quick compilation. The typesetter
# subagent invokes pandoc directly with the specific versioned filename
# (e.g., ANALYSIS_NOTE_4a_v1.md) rather than using this task.
build-pdf = "cd phase5_documentation/outputs && EXTRA_PREAMBLE=''; [ -f analysis_preamble.tex ] && EXTRA_PREAMBLE='--include-in-header=analysis_preamble.tex'; pandoc ANALYSIS_NOTE_5_v1.md -o ANALYSIS_NOTE_5_v1.tex --standalone --include-in-header=../../conventions/preamble.tex $EXTRA_PREAMBLE --number-sections --toc --filter pandoc-crossref --citeproc --bibliography=references.bib && python ../../conventions/postprocess_tex.py ANALYSIS_NOTE_5_v1.tex && tectonic ANALYSIS_NOTE_5_v1.tex"
lint-plots = "python conventions/lint_plots.py ."
# --- Analysis tasks: add as you write scripts ---
# Each script gets an independently runnable task.
# The "all" task chains the full sequence — this is the reproducibility contract.
phase2-explore = "SSL_CERT_FILE=/etc/ssl/certs/ca-certificates.crt python phase2_exploration/src/explore_samples.py"
phase2-plots = "python phase2_exploration/src/plot_exploration.py"
phase2-local-manifest = "python phase2_exploration/src/localize_samples.py"
phase3-select = "python phase3_selection/src/build_selection.py"
phase3-mva = "python phase3_selection/src/model_inputs_and_mva.py"
phase3-compare = "python phase3_selection/src/compare_approaches.py"
phase3-plots = "python phase3_selection/src/plot_selection.py"
phase3-all = "pixi run phase3-select && pixi run phase3-mva && pixi run phase3-compare && pixi run phase3-plots"
all = "pixi run phase2-local-manifest && pixi run phase2-explore && pixi run phase2-plots && pixi run phase3-all"
